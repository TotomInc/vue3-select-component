name: CI

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - master
      - dev

jobs:
  build:
    name: Build library
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js environment
        uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm --filter vue3-select-component run build

  docs:
    name: Build docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js environment
        uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm run docs:build

  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js environment
        uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter vue3-select-component exec playwright install --with-deps chromium

      - name: Test library
        run: pnpm --filter vue3-select-component run test -- --reporter=verbose

      - name: Test coverage
        run: pnpm --filter vue3-select-component run test:coverage -- --reporter=verbose

  commitlint:
    name: Lint commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js environment
        uses: actions/setup-node@v7
        with:
          node-version: 24.x

      - name: Lint commit messages
        run: |
          cat > commitlint.config.mjs <<'EOF'
          export default {
            extends: ['@commitlint/config-conventional'],
          };
          EOF

          npx --yes -p @commitlint/cli -p @commitlint/config-conventional commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to HEAD \
            --verbose
